
services:
  jaanos-suite:
    image: ghcr.io/vibebuild-ai/jaanos/suite:latest
    container_name: jaanos-suite
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "${APP_PORT}:3000"
    environment:
      - DATABASE_URL=postgresql://jaanos:${POSTGRES_PASSWORD}@db:5432/jaanos
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - NEXT_PUBLIC_APP_URL=http://${DOMAIN}:${APP_PORT}
      - AUTH_URL=http://${DOMAIN}:${APP_PORT}/api/auth
      - NEXT_PUBLIC_DEFAULT_ERP=tryton
      - NEXT_PUBLIC_LOCK_ERP_CONNECTION=false
      - HUB_RATE_LIMIT_PER_MIN=600
      - AUTH_LOCAL_ENABLED=true
      - RUN_MIGRATIONS_ON_BOOT=true
    networks:
      - jaanos-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  db:
    image: postgres:16-alpine
    container_name: jaanos-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=jaanos
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=jaanos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jaanos-net

  watchtower:
    image: containrrr/watchtower
    container_name: jaanos-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_CLEAN_UP=true

  tryton:
    image: tryton/tryton:7.0
    container_name: jaanos-tryton
    restart: unless-stopped
    profiles:
      - tryton
    depends_on:
      - db
    environment:
      - TRYTOND_DATABASE__URI=postgresql://jaanos:${POSTGRES_PASSWORD}@db:5432/
    networks:
      - jaanos-net

  tryton-init:
    image: tryton/tryton:7.0
    container_name: jaanos-tryton-init
    profiles:
      - tryton
    depends_on:
      - db
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TRYTON_ADMIN_PASSWORD=${BUNDLED_TRYTON_ADMIN_PASSWORD}
      - TRYTOND_DATABASE__URI=postgresql://jaanos:${POSTGRES_PASSWORD}@db:5432/
      - PYTHONUNBUFFERED=1
    entrypoint: ["python3", "-c"]
    command:
      - |
        import sys, os, time, subprocess
        # Wait for postgres
        for _ in range(30):
            try:
                import socket
                s = socket.create_connection(("db", 5432), timeout=1)
                s.close()
                break
            except:
                time.sleep(1)
        
        # Connect to postgres and create database 'tryton' if not exists
        try:
            import psycopg as pg
            is_psycopg3 = True
        except ImportError:
            try:
                import psycopg2 as pg
                is_psycopg3 = False
            except ImportError:
                print("Error: Neither psycopg nor psycopg2 is installed!")
                sys.exit(1)
        
        db_pass = os.environ.get("POSTGRES_PASSWORD")
        db_uri = f"postgresql://jaanos:{db_pass}@db:5432/jaanos"
        try:
            conn = pg.connect(db_uri, autocommit=True) if is_psycopg3 else pg.connect(db_uri)
            if not is_psycopg3: conn.autocommit = True
            cur = conn.cursor()
            cur.execute("SELECT 1 FROM pg_database WHERE datname='tryton'")
            if not cur.fetchone():
                print("Database 'tryton' does not exist. Creating...")
                cur.execute("CREATE DATABASE tryton")
                print("Database 'tryton' created successfully.")
            else:
                print("Database 'tryton' already exists.")
            cur.close()
            conn.close()
        except Exception as e:
            print(f"Error creating database 'tryton': {e}")
            sys.exit(1)
        
        # Check if database is already initialized
        db_tryton_uri = f"postgresql://jaanos:{db_pass}@db:5432/tryton"
        initialized = False
        try:
            conn = pg.connect(db_tryton_uri)
            cur = conn.cursor()
            cur.execute("SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='ir_module'")
            if cur.fetchone():
                try:
                    cur.execute("SELECT 1 FROM ir_module WHERE name='account_invoice' AND (state='activated' OR state='installed')")
                    if cur.fetchone():
                        initialized = True
                except Exception as db_err:
                    print(f"Checking module state failed, database may be partially initialized: {db_err}")
            cur.close()
            conn.close()
        except Exception as e:
            print(f"Checking initialization failed (expected on fresh DB): {e}")
        
        if initialized:
            print("Database 'tryton' already initialized. Exiting (idempotent).")
            sys.exit(0)
        
        print("Initializing Tryton database and activating modules...")
        admin_pass = os.environ.get("TRYTON_ADMIN_PASSWORD")
        with open("/tmp/trytonpass", "w") as f:
            f.write(admin_pass + "\n")
        
        os.environ["TRYTONPASSFILE"] = "/tmp/trytonpass"
        
        # Check which modules are available
        import trytond.modules
        modules_dir = os.path.dirname(trytond.modules.__file__)
        candidate_modules = ["company", "account_de_skr03", "account_invoice", "jaaniq_sync"]
        modules_to_install = []
        for m in candidate_modules:
            if os.path.exists(os.path.join(modules_dir, m)):
                modules_to_install.append(m)
            else:
                print(f"Module '{m}' not found. Skipping.")
        
        # Run trytond-admin with retry loop
        cmd = ["trytond-admin", "-d", "tryton", "-u"] + modules_to_install + ["--all", "--activate-dependencies", "-p", "--email", "admin@jaanos.de"]
        max_attempts = 3
        for attempt in range(1, max_attempts + 1):
            print(f"Running trytond-admin (attempt {attempt}/{max_attempts})...", flush=True)
            res = subprocess.run(cmd)
            if res.returncode == 0:
                print("Tryton database initialized successfully.", flush=True)
                sys.exit(0)
            else:
                print(f"Attempt {attempt} failed with exit code {res.returncode}.", flush=True)
                if attempt < max_attempts:
                    time.sleep(5)
                else:
                    print(f"trytond-admin initialization failed after {max_attempts} attempts.", flush=True)
                    sys.exit(res.returncode)
    networks:
      - jaanos-net

volumes:
  postgres_data:

networks:
  jaanos-net:
    driver: bridge
